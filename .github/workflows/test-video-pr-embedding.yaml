name: Test Video PR Embedding

on:
  workflow_dispatch:

jobs:
  test-video-embedding:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Create test video directory
        run: |
          mkdir -p benchmarks/src/main/kotlin/com/google/samples/apps/nowinandroid/Generator

      - name: Generate 2 simple test videos
        run: |
          OUT_DIR="benchmarks/src/main/kotlin/com/google/samples/apps/nowinandroid/Generator"

          # Video 1 (red screen)
          ffmpeg -f lavfi -i color=c=red:s=320x240:d=2 \
            -vf "drawtext=text='Scenario 1':fontcolor=white:x=10:y=10" \
            -c:v libx264 -crf 28 -pix_fmt yuv420p \
            "$OUT_DIR/scenario-1.mp4"

          # Video 2 (blue screen)
          ffmpeg -f lavfi -i color=c=blue:s=320x240:d=2 \
            -vf "drawtext=text='Scenario 2':fontcolor=white:x=10:y=10" \
            -c:v libx264 -crf 28 -pix_fmt yuv420p \
            "$OUT_DIR/scenario-2.mp4"

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Create branch
        id: create-branch
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BRANCH_NAME="test/video-embedding-${SHORT_SHA}-${{ github.run_id }}"
          git checkout -b "$BRANCH_NAME"
          echo "branch-name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Commit videos
        run: |
          git config user.name "${{ vars.GH_APP_NAME }}[bot]"
          git config user.email "${{ vars.GH_APP_NAME }}[bot]@users.noreply.github.com"
          git add benchmarks/
          git commit -m "test: add sample videos for PR embedding"

      - name: Push branch
        run: |
          git remote set-url origin https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}
          git push origin "${{ steps.create-branch.outputs.branch-name }}"

      - name: Collect video embeds (RAW URLs)
        id: collect-videos
        run: |
          VIDEO_DIR="benchmarks/src/main/kotlin/com/google/samples/apps/nowinandroid/Generator"
          VIDEO_EMBEDS=""

          while IFS= read -r -d '' file; do
            RAW_URL="https://raw.githubusercontent.com/${{ github.repository }}/${{ steps.create-branch.outputs.branch-name }}/${file#./}"
            VIDEO_EMBEDS="${VIDEO_EMBEDS}"$'\n'"<video src=\"${RAW_URL}\" controls width=\"320\"></video>"
          done < <(find "$VIDEO_DIR" -name "*.mp4" -print0 | sort -z)

          {
            echo "video-embeds<<EOF"
            echo "$VIDEO_EMBEDS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Open Pull Request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr create \
            --title "Test: Video embedding in PR" \
            --body "## 🎥 Video Embedding Test

This PR verifies that MP4 videos render correctly inside PR descriptions.

### Expected:
- Videos should be playable inline (no clicking required)

### Videos:
${{ steps.collect-videos.outputs.video-embeds }}
" \
            --head "${{ steps.create-branch.outputs.branch-name }}"
