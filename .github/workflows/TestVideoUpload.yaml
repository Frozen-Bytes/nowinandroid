name: Test Video PR Upload

on:
  workflow_dispatch:

jobs:
  test-video-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate github app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Download test video
        run: |
          curl -L -o test-video.mp4 "https://www.w3schools.com/html/mov_bbb.mp4"
          ls -lh test-video.mp4
          file test-video.mp4

      - name: Create temp branch
        run: |
          git config user.name "${{ vars.GH_APP_NAME }}[bot]"
          git config user.email "${{ vars.GH_APP_NAME }}[bot]@users.noreply.github.com"
          BRANCH="test-video-upload-$(date +%s)"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          git checkout -b "$BRANCH"
          echo "timestamp=$(date)" > test-marker.txt
          git add test-marker.txt
          git commit -m "test: video upload"
          git remote set-url origin https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}
          git push origin "$BRANCH"

      - name: Create PR and upload video
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR_URL=$(gh pr create \
            --title "Test: Video Upload" \
            --body "Uploading video..." \
            --head "$BRANCH")

          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')

          echo "PR Number: $PR_NUMBER"
          echo "PR URL: $PR_URL"

          echo "--- Video file info ---"
          ls -lh test-video.mp4
          file test-video.mp4
          echo "--- End file info ---"

          UPLOAD_URL="https://uploads.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/assets?name=test-video.mp4"
          echo "Uploading to: $UPLOAD_URL"
          
          UPLOAD_RESPONSE=$(curl -s \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -F "file=@test-video.mp4;type=video/mp4" \
            "$UPLOAD_URL" 2>&1)

          echo "Full curl output: $UPLOAD_RESPONSE"

          VIDEO_URL=$(echo "$UPLOAD_RESPONSE" | jq -r '.url' 2>/dev/null)
          echo "Video URL: $VIDEO_URL"

          gh pr edit "$PR_NUMBER" --body "## Test Video Upload

          If the video appears inline below, the approach is confirmed working ✅

          ${VIDEO_URL}"
