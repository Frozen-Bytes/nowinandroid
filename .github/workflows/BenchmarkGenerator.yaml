name: Macrobenchmark Generator

on:
    workflow_dispatch:
        inputs:
            benchmarks-count:
                description: 'Number of macrobenchmarks you would like to generate'
                required: true
                default: 1
                type: number

jobs:
    generate-benchmarks:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write

        steps:
            - name: Free Disk Space
              run: |
                sudo rm -rf /usr/share/dotnet
                sudo rm -rf /opt/ghc
                sudo rm -rf "/usr/local/share/boost"

            - name: Enable KVM
              run: |
                echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
                sudo udevadm control --reload-rules
                sudo udevadm trigger --name-match=kvm

            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup JDK 17
              uses: actions/setup-java@v4
              with:
                distribution: "zulu"
                java-version: "17"
    
            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v5

            - name: Build APK
              # app/build/outputs/apk/demo/benchmarkRelease/app-demo-benchmarkRelease.apk
              run: |
                chmod +x ./gradlew
                ./gradlew :app:assembleDemoBenchmark

            # AI
            # Inputs: APK location, inputs.benchmarks-count
            # Outputs: JSON file per generated scenario

            - name: Generate github app token
              id: app-token
              uses: actions/create-github-app-token@v3
              with:
                client-id: ${{ vars.GH_APP_CLIENT_ID }}
                private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
            
            - name: Create pull request branch
              id: create-branch
              run: |
                BRANCH_NAME="macrobenchmark/generated-$(date +'%Y%m%d-%H%M%S')-${{ github.run_id }}"
                git checkout -b "$BRANCH_NAME"
                echo "branch-name=$BRANCH_NAME" >> $GITHUB_OUTPUT

            # actions-to-macrobenchmark script
            # Inputs: JSON files location, path to store the benchmarks that will be generated
            # Outputs: startup benchmark, frame rendering/memory benchmarks per JSON file
            
            - name: Add dummy change for testing
              run: |
                mkdir -p benchmarks
                echo "Benchmark run: $(date) | Run ID: ${{ github.run_id }}" >> benchmarks/test-run.log

            - name: Commit generated benchmarks
              run: |
                git config user.name "${{ vars.GH_APP_NAME }}[bot]"
                git config user.email "${{ vars.GH_APP_NAME }}[bot]@users.noreply.github.com"
                git add benchmarks/  # adjust this path to where the benchmarks are written
                git commit -m "chore: add generated macrobenchmarks
        
                Generated ${{ inputs.benchmarks-count }} macrobenchmark(s)
                Triggered by: @${{ github.actor }}
                Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" || echo "No changes to commit"
            
            - name: Push benchmark branch
              run: |
                git remote set-url origin https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}
                git push origin "${{ steps.create-branch.outputs.branch-name }}"
            
            - name: Open Pull Request
              env:
                GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                gh pr create \
                --title "chore: generated ${{ inputs.benchmarks-count }} macrobenchmarks" \
                --body "## 🤖 Macrobenchmark Generation

                This PR was automatically generated by the Macrobenchmark Generator workflow.

                **Triggered by:** @${{ github.actor }}
                **Benchmarks generated:** ${{ inputs.benchmarks-count }}" \
                --head "${{ steps.create-branch.outputs.branch-name }}"