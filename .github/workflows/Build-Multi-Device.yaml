name: Benchmark on Emulator Multi-Device

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  benchmark-android:
    uses: Frozen-Bytes/actions/.github/workflows/android-macrobenchmark-gradle.yml@v3
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Pixel"
            profile: "pixel"
          - name: "Nexus_6"
            profile: "Nexus 6"
          - name: "Nexus_4"
            profile: "Nexus 4"
    name: ${{ matrix.name }}
    with:
      api-level: 34
      target: google_apis
      arch: x86_64
      profile: "${{ matrix.profile }}"
      gradle-cache-readonly: false
      baseline-branch: "gh-action-dev"
      candidate-branch: "gh-action-dev"
      instrument-args: "-e class com.google.samples.apps.nowinandroid.startup.StartupBenchmark#startupPrecompiledWithBaselineProfile"
      artifact-name: "benhcomp-${{ matrix.name }}.json"
      artifact-macrobenchmark-name: "${{ matrix.name }}-raw-macrobenchmark"
      device-alias: "${{ matrix.name }}"

  publish-report:
    runs-on: ubuntu-latest
    needs: benchmark-android
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Publish Report
        uses: Frozen-Bytes/actions/publish-report@v3
        with:
          artifact-prefix: "benchcomp-"
          comment-on-pr: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
